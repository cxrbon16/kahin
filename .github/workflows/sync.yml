name: Cron Sync
on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync API
        env:
          # SITE_URL: production URL without trailing slash, e.g. https://your-app.vercel.app
          # CRON_SECRET: must match the CRON_SECRET env var in Vercel exactly.
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::error::SITE_URL secret is empty. Set it in repo Settings -> Secrets -> Actions."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is empty. Set it in repo Settings -> Secrets -> Actions."
            exit 1
          fi

          # Strip any trailing slash so we never build //api/sync.
          BASE="${SITE_URL%/}"
          URL="$BASE/api/sync"
          echo "Calling $URL"

          # Capture body and HTTP status separately (no -f, so we can read the body on failure).
          HTTP_CODE=$(curl -sS -o /tmp/sync_body.txt -w "%{http_code}" \
            -X GET "$URL" \
            -H "Authorization: Bearer $CRON_SECRET")

          echo "HTTP $HTTP_CODE"
          echo "Response body:"
          cat /tmp/sync_body.txt
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Sync failed with HTTP $HTTP_CODE. 401 = CRON_SECRET mismatch; 404 = wrong SITE_URL; 500 = server/env error (see body above)."
            exit 1
          fi
          echo "Sync OK."
